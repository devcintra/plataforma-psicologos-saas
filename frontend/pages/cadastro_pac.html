<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PsiConnect - Cadastro Paciente</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo-nav"><img src="../img/logo-cerebro.png" alt="Logo"></div>
        <nav class="menu">
            <a href="index.html">Home</a>
            <a href="#">Sobre</a>
            <a href="#">Contato</a>
        </nav>
    </header>

    <main class="container">
        <div class="banner">
            <div class="banner-titulo">
                <h1>PsiConnect</h1>
                <img src="../img/logo-cerebro2.png" alt="Logo">
            </div>
            <p>Encontre apoio psicológico especializado e humanizado de forma simples</p>
        </div>

        <h2 class="titulo-pagina">Criar Conta Paciente</h2>

<form id="form-cadastro-paciente" class="form-login" style="max-width: 540px;">
            
            <div class="field">
                <label for="nome-pac">Nome Completo <span class="required">*</span></label>
                <input type="text" id="nome-pac" placeholder="Digite seu nome completo" required>
            </div>

            <div class="form-row">
                <div class="field">
                    <label for="cpf-pac">CPF <span class="required">*</span></label>
                    <input type="text" id="cpf-pac" placeholder="000.000.000-00" required>
                </div>
                <div class="field">
                    <label for="celular-pac">Telefone</label>
                    <input type="tel" id="celular-pac" placeholder="(11) 99999-9999">
                </div>
            </div>

            <div class="field">
                <label for="email-pac">E-mail <span class="required">*</span></label>
                <input type="email" id="email-pac" placeholder="Digite seu email" required>
            </div>

            <div class="form-row">
                <div class="field">
                    <label for="senha-pac">Senha <span class="required">*</span></label>
                    <input type="password" id="senha-pac" placeholder="Mínimo 6 caracteres" required>
                </div>
                <div class="field">
                    <label for="confirmar-pac">Confirmar Senha <span class="required">*</span></label>
                    <input type="password" id="confirmar-pac" placeholder="Confirme sua senha" required>
                </div>
            </div>

            <div class="field" style="margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border, #E4D8F5);">
                <label style="font-weight: 700; margin-bottom: 12px; display: block;">Conte um pouco sobre você (Opcional)</label>
                
                <p style="font-size: 0.85rem; font-weight: 600; color: var(--sub); margin-bottom: 8px;">Qual a sua principal preocupação?</p>
                <div class="grid-especialidades" style="margin-bottom: 16px;">
                    <label class="card-checkbox">
                        <input type="checkbox" name="preocupacao" value="ansiedade"> Ansiedade
                    </label>
                    <label class="card-checkbox">
                        <input type="checkbox" name="preocupacao" value="depressao"> Depressão
                    </label>
                    <label class="card-checkbox">
                        <input type="checkbox" name="preocupacao" value="relacionamentos"> Relacionamentos
                    </label>
                    <label class="card-checkbox">
                        <input type="checkbox" name="preocupacao" value="carreira"> Trabalho/Carreira
                    </label>
                </div>

                <p style="font-size: 0.85rem; font-weight: 600; color: var(--sub); margin-bottom: 8px;">Preferência de horário</p>
                <div class="grid-especialidades" style="margin-bottom: 16px;">
                    <label class="card-checkbox">
                        <input type="checkbox" name="horario" value="manha"> Manhã (8h - 12h)
                    </label>
                    <label class="card-checkbox">
                        <input type="checkbox" name="horario" value="tarde"> Tarde (12h - 19h)
                    </label>
                    <label class="card-checkbox">
                        <input type="checkbox" name="horario" value="noite"> Noite (19h - 22h)
                    </label>
                    <label class="card-checkbox">
                        <input type="checkbox" name="horario" value="fds"> Final de Semana
                    </label>
                </div>

                <div class="field" style="max-width: 260px;">
                    <label for="preco-pac">Faixa de preço</label>
                    <select id="preco-pac" style="width: 100%; padding: 10px; border: 1.5px solid var(--border, #E4D8F5); border-radius: 8px; font-family: inherit; color: var(--text);">
                        <option value="">Selecione...</option>
                        <option value="ate80">Até R$ 80</option>
                        <option value="80-150">R$ 80 – R$ 150</option>
                        <option value="150-250">R$ 150 – R$ 250</option>
                        <option value="acima250">Acima de R$ 250</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg btn-full" style="margin-top: 20px;">Criar conta</button>
        </form>
    </main>

    <footer class="rodape">
        <a href="../pages/login_pac.html" style="display:block; text-align:center; margin-bottom:15px; color:var(--plum); font-weight:600; text-decoration:none;">Já tem conta? Entrar</a>
        <a href="index.html" class="btn-voltar">Voltar</a>
    </footer>

    <script src="../js/cadastro_pac.js"></script>
</body>
</html>
