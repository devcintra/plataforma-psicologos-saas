<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Nova Senha</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<main class="container">

    <h2>Definir Nova Senha</h2>

    <form id="formNovaSenha" class="form-login">

        <div class="field">
            <label>Código</label>
            <input
                type="text"
                id="codigo"
                required>
        </div>

        <div class="field">
            <label>Nova Senha</label>
            <input
                type="password"
                id="senha"
                required>
        </div>

        <button
            type="submit"
            class="btn-full">
            Alterar Senha
        </button>

    </form>

</main>

<script src="../js/nova_senha.js"></script>

</body>
</html>
