<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PsiConnect - Cadastro Concluído</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo-nav"><img src="../img/logo-cerebro.png" alt="Logo"></div>
        <nav class="menu">
            <a href="index.html">Home</a>
            <a href="#">Sobre</a>
            <a href="#">Contato</a>
        </nav>
    </header>

    <main class="container" style="justify-content: center; min-height: 75vh;">
        <div class="sucesso-box">
            <div class="sucesso-icone">✓</div>
            <h2 class="titulo-pagina" style="margin-bottom: 12px;">Cadastro Concluído!</h2>
            <p style="color: var(--sub); margin-bottom: 35px; font-weight: 500; line-height: 1.6; font-size: 1.05rem;">
                Seu perfil profissional foi criado com sucesso no ecossistema do **PsiConnect**. <br>
                Sua documentação foi enviada e agora você já pode gerenciar sua agenda.
            </p>
            
            <a href="dashboard.html" class="btn-criar-perfil" style="display: block; max-width: 280px; margin: 0 auto 20px auto; padding: 14px 20px; text-decoration: none; font-size: 1.1rem; box-shadow: var(--sh);">
                Acessar meu Dashboard
            </a>

            <a href="index.html" style="color: var(--sub); font-weight: 600; text-decoration: none; font-size: 0.9rem; display: inline-block; transition: color 0.2s;" onmouseover="this.style.color='var(--plum)'" onmouseout="this.style.color='var(--sub)'">
                Voltar para a Página Inicial
            </a>
        </div>
    </main>

</body>
</html>
